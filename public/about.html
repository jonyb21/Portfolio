<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="description" content="About Jon Brooks and the studio approach.">
    <title>About | Jon Brooks</title>
    <link rel="stylesheet" href="/styles.css">
  </head>
  <body data-page="about">
    <header class="site-header">
      <a class="brand" href="/" data-field="brand">Jon Brooks</a>
      <nav id="nav"></nav>
    </header>

    <main>
      <section class="about page-section" id="about">
        <h1 data-field="about.title">About</h1>
        <div class="about-copy">
          <p data-field="about.body">A quiet practice focused on proportion, material honesty, and useful objects built to last.</p>
          <div class="portrait-slot" aria-hidden="true"></div>
        </div>
      </section>

      <section class="experience page-section">
        <div class="section-head">
          <div>
            <h2 data-field="about.experienceTitle">Experience</h2>
            <p class="page-intro" data-field="about.experienceIntro">Relevant work across furniture design, product development, fabrication, and client-led interior pieces.</p>
          </div>
        </div>
        <div class="experience-list" id="experience-list"></div>
      </section>
    </main>

    <script src="/app.js" defer></script>
  </body>
</html>
