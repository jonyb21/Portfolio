<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="icon" href="/favicon.svg?v=20260705-4" type="image/svg+xml">
    <title>Portfolio Admin</title>
    <link rel="stylesheet" href="/admin.css">
  </head>
  <body>
    <main class="admin-shell">
      <section class="toolbar">
        <div>
          <p>Portfolio Admin</p>
          <h1>Site content</h1>
        </div>
        <a href="/">View site</a>
      </section>

      <section class="login-panel" id="login-panel">
        <form id="login-form">
          <label>
            Admin password
            <input id="password" type="password" inputmode="numeric" autocomplete="current-password" required>
          </label>
          <button type="submit">Unlock editor</button>
          <output id="login-status" role="status" aria-live="polite" aria-atomic="true">Enter the admin password to edit the site.</output>
        </form>
      </section>

      <section class="editor-panel" id="editor-panel" hidden>
        <nav class="tabs" role="tablist" aria-label="Admin sections">
          <button type="button" class="tab active" id="tab-home" role="tab" aria-controls="panel-home" aria-selected="true" tabindex="0" data-tab="home">Home</button>
          <button type="button" class="tab" id="tab-work" role="tab" aria-controls="panel-work" aria-selected="false" tabindex="-1" data-tab="work">Work</button>
          <button type="button" class="tab" id="tab-about" role="tab" aria-controls="panel-about" aria-selected="false" tabindex="-1" data-tab="about">About</button>
          <button type="button" class="tab" id="tab-contact" role="tab" aria-controls="panel-contact" aria-selected="false" tabindex="-1" data-tab="contact">Contact</button>
          <button type="button" class="tab" id="tab-nav" role="tab" aria-controls="panel-nav" aria-selected="false" tabindex="-1" data-tab="nav">Nav</button>
        </nav>

        <form id="admin-form">
          <section class="panel active" id="panel-home" role="tabpanel" aria-labelledby="tab-home" data-panel="home">
            <label>
              Brand
              <input name="brand" required>
            </label>
            <label>
              Hero title
              <textarea name="hero.title" rows="3" required></textarea>
            </label>
            <label>
              Hero body
              <textarea name="hero.body" rows="4" required></textarea>
            </label>
            <label>
              Hero button label
              <input name="hero.cta" required>
            </label>
            <label>
              Hero button link
              <input name="hero.ctaHref" required>
            </label>
            <label>
              Hero image URL
              <input name="hero.image" required>
            </label>
            <label>
              Hero detail image URL
              <input name="hero.detailImage">
            </label>
          </section>

          <section class="panel" id="panel-work" role="tabpanel" aria-labelledby="tab-work" data-panel="work" hidden>
            <label>
              Work page title
              <input name="workTitle" required>
            </label>
            <label>
              Work action label
              <input name="workCta" required>
            </label>
            <label>
              Work intro
              <textarea name="workIntro" rows="3"></textarea>
            </label>
            <div class="list-head">
              <span>Projects</span>
            </div>
            <div id="projects-editor" class="stack"></div>
          </section>

          <section class="panel" id="panel-about" role="tabpanel" aria-labelledby="tab-about" data-panel="about" hidden>
            <label>
              About page title
              <input name="about.title" required>
            </label>
            <label>
              About body
              <textarea name="about.body" rows="5" required></textarea>
            </label>
            <label>
              Portrait image URL
              <input name="about.portrait">
            </label>
            <label>
              Experience title
              <input name="about.experienceTitle" required>
            </label>
            <label>
              Experience intro
              <textarea name="about.experienceIntro" rows="3" required></textarea>
            </label>
            <div class="list-head">
              <span>Experience</span>
              <button type="button" id="add-experience">Add experience</button>
            </div>
            <div id="experience-editor" class="stack"></div>
          </section>

          <section class="panel" id="panel-contact" role="tabpanel" aria-labelledby="tab-contact" data-panel="contact" hidden>
            <label>
              Contact page title
              <input name="contact.title" required>
            </label>
            <label>
              Contact body
              <textarea name="contact.body" rows="5" required></textarea>
            </label>
            <label>
              Contact email
              <input name="contact.email" type="email" required>
            </label>
            <label>
              Contact phone
              <input name="contact.phone" inputmode="tel" required>
            </label>
          </section>

          <section class="panel" id="panel-nav" role="tabpanel" aria-labelledby="tab-nav" data-panel="nav" hidden>
            <div class="list-head">
              <span>Top navigation</span>
              <button type="button" id="add-nav">Add link</button>
            </div>
            <div id="nav-editor" class="stack"></div>
          </section>

          <div class="action-bar">
            <output id="status" role="status" aria-live="polite" aria-atomic="true">Loading content...</output>
            <div class="actions">
              <button type="button" id="reload">Reload</button>
              <button type="submit">Save changes</button>
            </div>
          </div>
        </form>
      </section>
    </main>
    <script src="/admin.js" defer></script>
  </body>
</html>
