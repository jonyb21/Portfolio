<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="description" content="Jon Brooks portfolio of considered furniture and object design.">
    <title>Jon Brooks Portfolio</title>
    <link rel="stylesheet" href="/styles.css">
  </head>
  <body data-page="home">
    <header class="site-header">
      <a class="brand" href="/" data-field="brand">Jon Brooks</a>
      <nav id="nav"></nav>
    </header>

    <main>
      <section class="hero">
        <div class="hero-copy">
          <h1 data-field="hero.title">Designing furniture with clarity, character, and longevity.</h1>
          <p data-field="hero.body">I’m Jon Brooks, an industrial designer creating considered furniture and objects. This portfolio is a selection of projects shaped by craftsmanship, material sensitivity, and purposeful design.</p>
          <a class="text-link" data-field-href="hero.ctaHref" href="/work"><span data-field="hero.cta">View selected work</span><span aria-hidden="true">→</span></a>
        </div>
        <figure class="hero-image">
          <img data-field="hero.image" src="https://images.unsplash.com/photo-1567538096630-e0c55bd6374c?auto=format&fit=crop&w=1200&q=80" alt="Featured furniture piece">
        </figure>
      </section>

    </main>

    <script src="/app.js" defer></script>
  </body>
</html>
