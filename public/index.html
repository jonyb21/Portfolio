<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="description" content="Jon Brooks portfolio of considered furniture and object design.">
    <title>Jon Brooks Portfolio</title>
    <link rel="stylesheet" href="/styles.css">
  </head>
  <body data-page="home">
    <header class="site-header">
      <a class="brand" href="/" data-field="brand">Jon Brooks</a>
      <nav id="nav"></nav>
    </header>

    <main>
      <section class="hero">
        <div class="hero-copy">
          <h1 data-field="hero.title">Designing furniture with clarity, character, and longevity.</h1>
          <p data-field="hero.body">I'm Jon Brooks, an industrial designer creating considered furniture and objects with quiet silhouettes, honest materials, and details built to age well.</p>
          <a class="text-link" data-field-href="hero.ctaHref" href="/work"><span data-field="hero.cta">View selected work</span><span aria-hidden="true">-&gt;</span></a>
        </div>
        <figure class="hero-image">
          <img data-field="hero.image" src="/assets/furniture/hero-lounge-chair.png" alt="Featured furniture piece">
        </figure>
      </section>
    </main>

    <script src="/app.js" defer></script>
  </body>
</html>
