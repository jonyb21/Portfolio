services:
  portfolio:
    build: .
    container_name: portfolio
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "8788:8788"
    volumes:
      - ./data:/app/data
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:8788/api/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 3
